<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.groq.com; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Business Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2 md:p-5 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-4 md:p-8 rounded-2xl shadow-2xl border border-gray-200">
        <h2 class="text-2xl md:text-3xl font-extrabold mb-6 text-blue-800 border-b pb-4 flex items-center gap-2">
            📊 Smart Business Operations Center
        </h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <label class="block text-lg font-semibold text-gray-700">Paste WhatsApp Message:</label>
                <textarea id="rawMessage" rows="6" class="w-full p-4 border-2 border-blue-100 rounded-xl focus:border-blue-500 focus:outline-none shadow-sm text-sm" placeholder="Customer Message..."></textarea>
                <button onclick="formatWithGroq()" id="btnText" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg">
                    Format Customer Info ✨
                </button>

                <div class="bg-gray-50 p-4 rounded-xl border space-y-3">
                    <h4 class="font-bold text-gray-600 uppercase text-xs">Customer Details</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input type="text" id="outName" oninput="updatePreview()" placeholder="Name" class="p-2 border rounded-lg w-full bg-white">
                        <input type="text" id="outPhone" oninput="updatePreview()" placeholder="Mobile Number 1" class="p-2 border rounded-lg w-full bg-white">
                    </div>
                    <input type="text" id="outPhone2" oninput="updatePreview()" placeholder="Secondary Numbers (Optional)" class="p-2 border rounded-lg w-full bg-white text-sm">
                    
                    <textarea id="outAddress" rows="2" oninput="updatePreview()" placeholder="Delivery Address" class="w-full p-2 border rounded-lg bg-white"></textarea>
                
                    <input type="text" id="outProduct" oninput="updatePreview()" placeholder="Product (from message)" class="w-full p-2 border-2 border-blue-200 rounded-lg bg-white italic text-sm">
                </div>         
                    
                <div class="flex gap-3 items-end">
                    <div class="w-2/3 space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Remark / Order Type</label>
                        <input type="text" id="remark" list="remarkOptions" oninput="updatePreview()" placeholder="Select or type remark..." class="w-full p-2 border-2 border-blue-200 rounded-lg bg-orange-50 text-sm focus:border-orange-400 outline-none font-semibold">
                        <datalist id="remarkOptions">
                            <option value="Exchange"><option value="Damage"><option value="Missing"><option value="Without Delivery Charge"><option value="Deposit"><option value="Only Delivery Charge">
                        </datalist>
                    </div>

                    <div class="w-1/3 space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Delivery Fee</label>
                        <select id="delOption" onchange="handleDelOption()" class="w-full p-2 border-2 border-blue-200 rounded-lg bg-orange-50 text-sm focus:border-orange-400 outline-none font-semibold">
                            <option value="yes" selected>Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>                                         
                </div>

                <div class="bg-green-50 p-3 rounded-xl border border-green-200 flex items-center justify-between">
                    <label class="text-xs font-bold text-green-800 uppercase">Special Discount (Rs.)</label>
                    <select id="discountRate" onchange="renderCart(); updatePreview();" class="p-2 border-2 border-green-300 rounded-lg font-bold bg-white outline-none text-sm">
                        <option value="0">No Discount</option>
                        <option value="50">Rs. 50</option>
                        <option value="100">Rs. 100</option>
                        <option value="200">Rs. 200</option>
                        <option value="300">Rs. 300</option>
                        <option value="500">Rs. 500</option>
                    </select>
                </div>
                    
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                    <label class="block text-sm font-bold text-blue-800 mb-2 uppercase">Add Items (Search & Select)</label>
                    <div class="flex flex-wrap gap-2 items-end">
                        <div class="flex-1 min-w-[150px]">
                            <input type="text" id="productSearch" list="productOptions" 
                                   onfocus="this.value=''" 
                                   onchange="syncPriceFromSearch()" 
                                   placeholder="Click to select or type..." 
                                   class="w-full p-2 border-2 border-blue-300 rounded-lg bg-white font-semibold outline-none focus:border-blue-500 text-sm">
                            <datalist id="productOptions">
                                <option value="VIP Night Face Cream" data-price="3000">
                                <option value="Vip Night Body Cream" data-price="5000">
                                <option value="Night Serum (Alpha Arbutin)" data-price="2500">
                                <option value="Night Toner (Alpha Arbutin Toner)" data-price="1500">
                                <option value="Vip Night Big Face Cream" data-price="6000">
                                <option value="Vip Night Big Body Cream" data-price="8000">
                                <option value="Day Face Cream" data-price="1500">
                                <option value="Day Body Cream" data-price="3000">
                                <option value="Day Serum (Niacinamide)" data-price="2000">
                                <option value="Day Toner (Niacinamide)" data-price="1000">
                                <option value="Lip Blam" data-price="1500">
                                <option value="Lip Scrub" data-price="1000">
                                <option value="Charcoal Soap" data-price="800">
                                <option value="Milky & Honey Soap" data-price="1000">
                                <option value="Charcoal Face Wash" data-price="1000">
                                <option value="Hair Oil" data-price="1700">
                                <option value="Hair Toner" data-price="1700">
                                <option value="Lady White" data-price="4800">
                                <option value="Pinky Plus" data-price="4900">
                                <option value="Apple Cider" data-price="3900">
                                <option value="Berry Fiber" data-price="5400">
                            </datalist>
                        </div>
                        <input type="number" id="customPrice" placeholder="Price" class="w-20 p-2 border-2 border-blue-300 rounded-lg text-center font-bold bg-yellow-50 outline-none text-sm">
                        <input type="number" id="prodQty" value="1" min="1" class="w-14 p-2 border-2 border-blue-300 rounded-lg text-center font-bold outline-none text-sm">
                        <button onclick="addToCartFromSearch()" class="bg-blue-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-900 shadow-md text-sm">Add</button>
                    </div>
                </div>
            </div>

            <div class="bg-white border-2 border-gray-100 p-4 md:p-6 rounded-xl space-y-4 shadow-inner relative">
                <h3 class="text-xl font-bold text-gray-800 border-b pb-2">Order Summary</h3>
                
                <div class="max-h-48 overflow-y-auto border rounded-lg p-2 bg-white">
                    <table class="w-full text-left text-xs md:text-sm">
                        <thead class="sticky top-0 bg-white">
                            <tr class="border-b text-gray-400">
                                <th class="py-1">Item</th>
                                <th class="py-1 text-center">Qty</th>
                                <th class="py-1 text-right">Subtotal</th>
                                <th class="py-1 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                </div>

                <div>
                    <label class="block text-xs font-bold text-orange-600 uppercase mb-1">WhatsApp Message Preview</label>
                    <textarea id="waPreview" rows="8" class="w-full p-3 border rounded-lg bg-yellow-50 text-xs font-mono" readonly></textarea>
                </div>

                <div class="border-t pt-4 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black text-gray-800">Total: Rs. <span id="finalPrice" class="text-blue-700">0</span></span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="saveOrder()" class="bg-blue-900 text-white py-3 rounded-xl font-bold hover:bg-black transition-all shadow-md">
                            💾 Save Order
                        </button>
                        <button onclick="shareToWhatsApp()" class="bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-all shadow-md">
                            WhatsApp Send 🚀
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let deliveryCharge = 425.00; 

        function handleDelOption() {
            const option = document.getElementById('delOption').value;
            deliveryCharge = (option === "yes") ? 425.00 : 0.00;
            renderCart();
            updatePreview();
        }

        function syncPriceFromSearch() {
            const val = document.getElementById('productSearch').value;
            const opts = document.getElementById('productOptions').options;
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].value === val) {
                    document.getElementById('customPrice').value = opts[i].getAttribute('data-price');
                    break;
                }
            }
        }

        function addToCartFromSearch() {
            const name = document.getElementById('productSearch').value;
            const price = parseFloat(document.getElementById('customPrice').value);
            const qty = parseFloat(document.getElementById('prodQty').value);
            
            if (!name || isNaN(price)) return alert("Select product and enter price!");
            
            const existing = cart.find(item => item.name === name && item.price === price);
            if (existing) { 
                existing.qty += qty; 
            } else { 
                cart.push({ name, price, qty }); 
            }
            
            document.getElementById('productSearch').value = '';
            document.getElementById('customPrice').value = '';
            document.getElementById('prodQty').value = '1';
            
            renderCart();
            updatePreview();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updatePreview();
        }

        function renderCart() {
            const tbody = document.getElementById('cartItems');
            tbody.innerHTML = '';
            let subtotal = 0;
            cart.forEach((item, index) => {
                const itemtotal = item.price * item.qty;
                subtotal += itemtotal;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-2">${item.name}</td>
                        <td class="py-2 text-center font-bold">${item.qty}</td>
                        <td class="py-2 text-right font-bold">${itemtotal.toFixed(2)}</td>
                        <td class="py-2 text-center"><button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button></td>
                    </tr>`;
            });
            
            const discount = parseFloat(document.getElementById('discountRate').value) || 0;
            const currentTotal = subtotal > 0 ? (subtotal + deliveryCharge - discount) : 0;
            document.getElementById('finalPrice').innerText = currentTotal.toFixed(2);
        }

        function updatePreview() {
            const name = document.getElementById('outName').value || "...";
            const address = document.getElementById('outAddress').value || "...";
            const phone = document.getElementById('outPhone').value || "...";
            const phone2 = document.getElementById('outPhone2').value;
            const aiDetected = document.getElementById('outProduct').value;
            const remark = document.getElementById('remark').value;
            const discount = parseFloat(document.getElementById('discountRate').value) || 0;

            let subtotal = 0;
            cart.forEach(item => subtotal += (item.price * item.qty));
            const finalTotal = subtotal > 0 ? (subtotal + deliveryCharge - discount) : 0;
            
            let msg = `*NEW ORDER CONFIRMATION*\n`;
            msg += `--------------------------\n`;
            msg += `*Customer Name:* ${name}\n`;
            msg += `*Address:* ${address}\n`;
            msg += `*Phone 1:* ${phone}\n`;
            if(phone2) msg += `*Phone 2:* ${phone2}\n`;
            msg += `\n`; 

            if(aiDetected) msg += `*Order Note:* ${aiDetected}\n\n`;

            msg += `*Items List:*\n`;
            cart.forEach((item, index) => {
                msg += `${index + 1}. ${item.name} (x${item.qty}) - Rs.${(item.price * item.qty).toFixed(2)}\n`;
            });

            if (subtotal > 0) {
                msg += `\n*Subtotal: Rs. ${subtotal.toFixed(2)}*\n`;
                msg += `*Delivery Charge: Rs. ${deliveryCharge.toFixed(2)}*\n`;
                if(discount > 0) msg += `*Discount: - Rs. ${discount.toFixed(2)}*\n`;
                msg += `\n*Total Amount: Rs. ${finalTotal.toFixed(2)}*\n`;
            }
            
            if(remark) msg += `\n*Remark:* ${remark}\n`;
            msg += `--------------------------\n`;
            msg += `_Thank you!_`;

            document.getElementById('waPreview').value = msg;
        }

        async function formatWithGroq() {
            let rawText = document.getElementById('rawMessage').value;
            const btn = document.getElementById('btnText');
            if (!rawText) return alert("මැසේජ් එක ඇතුළත් කරන්න!");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                
        // Cloudflare Function එකට දත්ත යැවීම
            const response = await fetch('/format-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rawText: rawText })
        });

            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);

        // Fields වලට දත්ත පිරවීම
            document.getElementById('outName').value = result.name || "";
            document.getElementById('outAddress').value = result.address || "";
            document.getElementById('outPhone').value = result.phone || "";
            document.getElementById('outPhone2').value = result.phone2 || "";
            document.getElementById('outProduct').value = result.product || "";

        updatePreview();

    } catch (error) {
        console.error(error);
        alert("Error! Check Cloudflare Functions or Connection.");
    } finally {
        btn.innerText = "Format Customer Info ✨";
        btn.disabled = false;
    }
}

        function shareToWhatsApp() {
            const message = document.getElementById('waPreview').value;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function saveOrder() {
            alert("Order Details Saved Locally!");
        }
    </script>
</body>
</html>
