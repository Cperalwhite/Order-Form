<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.groq.com; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Business Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2 md:p-5 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-4 md:p-8 rounded-2xl shadow-2xl border border-gray-200">
        <h2 class="text-2xl md:text-3xl font-extrabold mb-6 text-blue-800 border-b pb-4 flex items-center gap-2">
            📊 Smart Business Operations Center
        </h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <label class="block text-lg font-semibold text-gray-700">Paste WhatsApp Message:</label>
                <textarea id="rawMessage" rows="6" class="w-full p-4 border-2 border-blue-100 rounded-xl focus:border-blue-500 focus:outline-none shadow-sm text-sm" placeholder="Customer Message..."></textarea>
                <button onclick="formatWithGroq()" id="btnText" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg">
                    Format Customer Info ✨
                </button>

                <div class="bg-gray-50 p-4 rounded-xl border space-y-3">
                    <h4 class="font-bold text-gray-600 uppercase text-xs">Customer Details</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input type="text" id="outName" oninput="updatePreview()" placeholder="Name" class="p-2 border rounded-lg w-full bg-white">
                        <input type="text" id="outPhone" oninput="updatePreview()" placeholder="Mobile Number 1" class="p-2 border rounded-lg w-full bg-white">
                    </div>
                    <input type="text" id="outPhone2" oninput="updatePreview()" placeholder="Secondary Numbers (Optional)" class="p-2 border rounded-lg w-full bg-white text-sm">
                    
                    <textarea id="outAddress" rows="2" oninput="updatePreview()" placeholder="Delivery Address" class="w-full p-2 border rounded-lg bg-white"></textarea>

                    <div class="space-y-1 mt-2">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Remark</label>
                        <input type="text" id="remark" oninput="updatePreview()" placeholder="Note..." class="w-full p-2 border-2 border-orange-200 rounded-lg bg-orange-50 text-sm focus:border-orange-400 outline-none">
                    </div>
                    
                    <input type="text" id="outProduct" oninput="updatePreview()" placeholder="Product (from message)" class="w-full p-2 border-2 border-blue-200 rounded-lg bg-white italic text-sm">
                </div>

                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                    <label class="block text-sm font-bold text-blue-800 mb-2 uppercase">Add Items to Cart</label>
                    <div class="flex flex-wrap gap-2">
                        <select id="productList" class="flex-1 p-2 border rounded-lg bg-white font-semibold">
                            <option value="0" data-name="">-- Select Product --</option>
                            <option value="3000" data-name="VIP Night Face Cream">VIP Night Face Cream</option>
                            <option value="5000" data-name="Vip Night Body Cream">Vip Night Body Cream</option>
                            <option value="2500" data-name="Night Serum (Alpha Arbutin)">Night Serum(Alpha Arbutin)</option>
                            <option value="1500" data-name="Night Toner (Alpha Arbutin Toner)">Night Toner (Alpha Arbutin Toner)</option>
                            <option value="6000" data-name="Vip Night Big Face Cream">Vip Night Big Face Cream</option>
                            <option value="8000" data-name="Vip Night Big Body Cream">Vip Night Big Body Cream</option>
                            <option value="1500" data-name="Day Face Cream">Day Face Cream</option>
                            <option value="3000" data-name="Day Body Cream">Day Body Cream</option>
                            <option value="2000" data-name="Day Serum (Niacinamide)">Day Serum (Niacinamide)</option>
                            <option value="1000" data-name="Day Toner (Niacinamide)">Day Toner (Niacinamide)</option>
                            <option value="1500" data-name="Lip Blam">Lip Blam</option>
                            <option value="1000" data-name="Lip Scrub">Lip Scrub </option>
                            <option value="800" data-name="Charcoal Soap">Charcoal Soap</option>
                            <option value="1000" data-name="Milky & Honey Soap">Milky & Honey Soap</option>
                            <option value="1000" data-name="Charcoal Face Wash">Charcoal Face Wash</option>
                            <option value="1700" data-name="Hair Oil">Hair Oil</option>
                            <option value="1700" data-name="Hair Toner">HairToner</option>
                            <option value="4800" data-name="Lady White">Lady White</option>
                            <option value="4900" data-name="Pinky Plus">Pinky Plus</option>
                            <option value="3900" data-name="Apple Cider">Apple Cider</option>
                            <option value="5400" data-name="Berry Fiber">Berry Fiber</option>
                        </select>
                        <input type="number" id="prodQty" value="1" min="1" class="w-16 p-2 border rounded-lg text-center font-bold">
                        <button onclick="addToCart()" class="bg-blue-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-900 shadow-md">Add</button>
                    </div>
                </div>
            </div>

            <div class="bg-white border-2 border-gray-100 p-4 md:p-6 rounded-xl space-y-4 shadow-inner relative">
                <h3 class="text-xl font-bold text-gray-800 border-b pb-2">Order Summary</h3>
                
                <div class="max-h-48 overflow-y-auto border rounded-lg p-2 bg-white">
                    <table class="w-full text-left text-xs md:text-sm">
                        <thead class="sticky top-0 bg-white">
                            <tr class="border-b text-gray-400">
                                <th class="py-1">Item</th>
                                <th class="py-1 text-center">Qty</th>
                                <th class="py-1 text-right">Subtotal</th>
                                <th class="py-1 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                </div>

                <div>
                    <label class="block text-xs font-bold text-orange-600 uppercase mb-1">WhatsApp Message Preview</label>
                    <textarea id="waPreview" rows="8" class="w-full p-3 border rounded-lg bg-yellow-50 text-xs font-mono" readonly></textarea>
                </div>

                <div class="border-t pt-4 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black text-gray-800">Total: Rs. <span id="finalPrice" class="text-blue-700">0</span></span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="saveOrder()" class="bg-blue-900 text-white py-3 rounded-xl font-bold hover:bg-black transition-all shadow-md">
                            💾 Save Order
                        </button>
                        <button onclick="shareToWhatsApp()" class="bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-all shadow-md">
                            WhatsApp Send 🚀
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        const deliveryCharge = 425; 

        function addToCart() {
            const select = document.getElementById('productList');
            const price = parseInt(select.value);
            const name = select.options[select.selectedIndex].getAttribute('data-name');
            const qty = parseInt(document.getElementById('prodQty').value);
            
            if (price === 0) return alert("Select Product!");
            
            const existing = cart.find(item => item.name === name);
            if (existing) { 
                existing.qty += qty; 
            } else { 
                cart.push({ name, price, qty }); 
            }
            renderCart();
            updatePreview();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updatePreview();
        }

        function renderCart() {
            const tbody = document.getElementById('cartItems');
            tbody.innerHTML = '';
            let subtotal = 0;
            cart.forEach((item, index) => {
                const itemtotal = item.price * item.qty;
                subtotal += itemtotal;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-2">${item.name}</td>
                        <td class="py-2 text-center font-bold">${item.qty}</td>
                        <td class="py-2 text-right font-bold">${itemtotal}</td>
                        <td class="py-2 text-center">
                            <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button>
                        </td>
                    </tr>`;
            });
            
            // නිවැරදි කිරීම 1: total වෙනුවට නිවැරදි අගය පෙන්වීම
            const currentTotal = subtotal > 0 ? (subtotal + deliveryCharge) : 0;
            document.getElementById('finalPrice').innerText = currentTotal;
        }

        function updatePreview() {
            const name = document.getElementById('outName').value || "...";
            const address = document.getElementById('outAddress').value || "...";
            const phone = document.getElementById('outPhone').value || "...";
            const phone2 = document.getElementById('outPhone2').value;
            const aiDetected = document.getElementById('outProduct').value;
            const remark = document.getElementById('remark').value;

            let subtotal = 0;
            cart.forEach(item => {
                subtotal += (item.price * item.qty);
            });

            const finalTotal = subtotal > 0 ? (subtotal + deliveryCharge) : 0;
            
            let msg = `*NEW ORDER CONFIRMATION*\n`;
            msg += `--------------------------\n`;
            msg += `*Customer Name:* ${name}\n`;
            msg += `*Address:* ${address}\n`;
            msg += `*Phone 1:* ${phone}\n`;
            if(phone2) {
                msg += `*Phone 2:* ${phone2}\n`;
            }
            msg += `\n`; 

            if(aiDetected) msg += `*Order Note:* ${aiDetected}\n\n`;

            msg += `*Items List:*\n`;
            cart.forEach((item, index) => {
                msg += `${index + 1}. ${item.name} (x${item.qty}) - Rs.${item.price * item.qty}\n`;
            });

            if (subtotal > 0) {
                msg += `\n*Subtotal: Rs. ${subtotal}*\n`;
                msg += `*Delivery Charge: Rs. ${deliveryCharge}*\n`;
                msg += `*Total Amount: Rs. ${finalTotal}*\n`;
            }
            
            if(remark) msg += `\n*Remark:* ${remark}\n`;

            // නිවැරදි කිරීම 2: මෙතැන තිබූ "total" ඉවත් කර finalTotal භාවිතා කළා
            msg += `--------------------------\n`;
            msg += `_Thank you!_`;

            document.getElementById('waPreview').value = msg;
        }

        async function formatWithGroq() {
            let rawText = document.getElementById('rawMessage').value;
            const btn = document.getElementById('btnText');
            if (!rawText) return alert("මැසේජ් එක ඇතුළත් කරන්න!");

            let cleanedText = rawText.replace(/\[.*?\]/g, "");
            cleanedText = cleanedText.replace(/^.*?:/gm, "");
            cleanedText = cleanedText.trim();

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: "Extract customer Name, Address, and Phone from the message. Return ONLY JSON: { \"name\": \"\", \"address\": \"\", \"phone\": \"\", \"phone2\": \"\", \"product\": \"\" }"
                            },
                            { role: "user", content: cleanedText }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                document.getElementById('outName').value = result.name || "";
                document.getElementById('outAddress').value = result.address || "";
                document.getElementById('outPhone').value = result.phone || "";
                document.getElementById('outPhone2').value = result.phone2 || "";
                document.getElementById('outProduct').value = result.product || "";

                updatePreview();

            } catch (error) {
                console.error(error);
                alert("Error! Check API Key or Connection.");
            } finally {
                btn.innerText = "Format Customer Info ✨";
                btn.disabled = false;
            }
        }

        function shareToWhatsApp() {
            const message = document.getElementById('waPreview').value;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function saveOrder() {
            alert("Order Details Saved Locally!");
        }
    </script>
</body>
</html>
